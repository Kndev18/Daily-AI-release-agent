name: AI Releases Daily Digest

on:
  schedule:
    # 16:00 UTC = 18:00 Budapest (CET+2 / CEST)
    # Using :02 to avoid GitHub's top-of-hour congestion
    - cron: '2 16 * * 1-5'
  workflow_dispatch:   # lets you trigger manually from the Actions tab

jobs:
  digest:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install anthropic requests

      - name: Run digest agent
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: python digest.py

      # Keepalive: touches a file every run so the repo never goes 60 days
      # without activity (which would cause GitHub to disable scheduled runs)
      - name: Keepalive commit
        run: |
          git config user.name  "digest-bot"
          git config user.email "digest-bot@users.noreply.github.com"
          date -u > .last_run
          git add .last_run
          git diff --cached --quiet || git commit -m "chore: digest keepalive $(date -u +%Y-%m-%d)"
          git push
